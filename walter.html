<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Walter — welociti</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body,html{width:100%;height:100%;overflow:hidden;background:#080808;}
#wp{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;background:#080808;position:relative;overflow:hidden;}
#bg-canvas{position:absolute;inset:0;pointer-events:none;z-index:0;}

/* GAME SCENE */
#game-scene{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;opacity:0;transition:opacity 1.4s ease;}
#game-canvas{position:absolute;inset:0;width:100%;height:100%;}

/* INTRO */
#intro{position:fixed;inset:0;background:#080808;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;}
#intro-chem{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.4em;color:rgba(255,255,255,.18);margin-bottom:28px;opacity:0;animation:fi .7s ease forwards .2s;}
#intro-name{font-size:clamp(56px,13vw,100px);font-weight:700;letter-spacing:-.03em;color:#fff;line-height:1;overflow:hidden;}
.ic{display:inline-block;opacity:0;transform:translateY(70px);animation:ci .55s cubic-bezier(.16,1,.3,1) forwards;}
#intro-sub{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.4em;color:rgba(255,255,255,.3);margin-top:14px;text-transform:uppercase;opacity:0;animation:fi .5s ease forwards 1.1s;}
#intro-line{width:0;height:1px;background:rgba(255,255,255,.3);margin-top:24px;animation:lg .9s cubic-bezier(.16,1,.3,1) forwards 1.4s;}
@keyframes ci{to{opacity:1;transform:translateY(0);}}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes lg{to{width:180px;}}

/* MAIN */
.content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:1.2rem;text-align:center;opacity:0;transform:translateY(16px);transition:opacity .9s ease,transform .9s ease;padding:2rem;}
.content.show{opacity:1;transform:translateY(0);}

/* AVATAR */
.av-wrap{position:relative;width:130px;height:130px;display:flex;align-items:center;justify-content:center;}
.av-ring{width:90px;height:90px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:#fff;background:#151515;transition:border-color .5s,box-shadow .5s;position:relative;z-index:2;user-select:none;}
.av-letter{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:#fff;transition:color .5s;pointer-events:none;}
#av-svg{position:absolute;inset:0;width:130px;height:130px;z-index:1;pointer-events:none;}
.arc-track{fill:none;stroke:rgba(255,255,255,.05);stroke-width:1;}
.arc-spin{fill:none;stroke-width:1.5;stroke-linecap:round;transform-origin:65px 65px;}
.arc-spin-1{stroke:rgba(255,255,255,.45);stroke-dasharray:35 330;animation:spinA 3s linear infinite;}
.arc-spin-2{stroke:rgba(255,255,255,.18);stroke-dasharray:18 347;animation:spinA 3s linear infinite reverse;animation-delay:-1.5s;}
.arc-spin-3{stroke:rgba(255,255,255,.08);stroke-dasharray:8 357;animation:spinA 5s linear infinite;animation-delay:-.8s;}
.dot-o{fill:#fff;transform-origin:65px 65px;animation:spinA 3s linear infinite;}
.dot-o2{fill:rgba(255,255,255,.35);transform-origin:65px 65px;animation:spinA 3s linear infinite reverse;animation-delay:-1.5s;}
@keyframes spinA{to{transform:rotate(360deg);}}

/* NAME */
.name-its{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.3em;color:rgba(255,255,255,.26);text-transform:uppercase;}
.name-main{font-size:52px;font-weight:700;color:#fff;letter-spacing:-.02em;line-height:1;}
.name-main span{display:inline-block;transition:color .2s,transform .2s;}
.name-main span:hover{transform:translateY(-3px);}
.status-row{display:flex;align-items:center;gap:7px;}
.dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:bp 2.5s ease-in-out infinite;}
@keyframes bp{0%,100%{opacity:1}50%{opacity:.3}}
.status-txt{font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,.32);letter-spacing:.12em;}
.bb-float{font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,.22);font-style:italic;transition:opacity .4s,transform .4s;max-width:260px;line-height:1.7;}
.divider{width:34px;height:1px;background:rgba(255,255,255,.08);}
.links-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;width:100%;max-width:300px;}
.lc{display:flex;align-items:center;gap:9px;padding:11px 13px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);text-decoration:none;color:#fff;transition:background .22s,border-color .22s,transform .18s;position:relative;overflow:hidden;opacity:0;transform:translateY(10px);}
.lc.visible{opacity:1;transform:translateY(0);}
.lc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04),transparent 55%);opacity:0;transition:opacity .22s;}
.lc:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.18);transform:translateY(-2px);}
.lc:hover::before{opacity:1;}
.lc:active{transform:scale(.97);}
.li{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s;}
.lc:hover .li{transform:scale(1.1);}
.ln{display:flex;flex-direction:column;gap:1px;}
.lp{font-size:9px;color:rgba(255,255,255,.3);font-family:'Space Mono',monospace;}
.lh{font-size:11px;font-weight:500;color:rgba(255,255,255,.8);}
.larr{margin-left:auto;font-size:10px;color:rgba(255,255,255,.18);opacity:0;transform:translateX(-4px);transition:opacity .2s,transform .2s;font-family:'Space Mono',monospace;}
.lc:hover .larr{opacity:1;transform:translateX(0);}
.footer-txt{font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,.13);letter-spacing:.12em;}
</style>
</head>
<body>

<div id="game-scene"><canvas id="game-canvas"></canvas></div>

<div id="intro">
  <div id="intro-chem">C₁₀H₁₅N · CH₄O₂S</div>
  <div id="intro-name"></div>
  <div id="intro-sub">welociti</div>
  <div id="intro-line"></div>
</div>

<div id="wp">
  <canvas id="bg-canvas"></canvas>
  <div class="content" id="mc">
    <div class="av-wrap">
      <svg id="av-svg" viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg">
        <circle class="arc-track" cx="65" cy="65" r="60"/>
        <circle class="arc-track" cx="65" cy="65" r="52"/>
        <circle class="arc-track" cx="65" cy="65" r="44"/>
        <circle class="arc-spin arc-spin-1" cx="65" cy="65" r="60"/>
        <circle class="arc-spin arc-spin-2" cx="65" cy="65" r="52"/>
        <circle class="arc-spin arc-spin-3" cx="65" cy="65" r="44"/>
        <circle class="dot-o" cx="65" cy="5" r="2.5"/>
        <circle class="dot-o2" cx="65" cy="13" r="1.8"/>
      </svg>
      <div class="av-ring" id="avatar"><span class="av-letter" id="av-letter">W</span></div>
    </div>
    <div class="name-its">it's</div>
    <div class="name-main">
      <span id="l1">W</span><span id="l2">a</span><span id="l3">l</span><span id="l4">t</span><span id="l5">e</span><span id="l6">r</span>
    </div>
    <div class="status-row"><div class="dot"></div><span class="status-txt">online</span></div>
    <div class="bb-float" id="bb-q">"I am the one who knocks."</div>
    <div class="divider"></div>
    <div class="links-grid">
      <a class="lc" id="lc1" href="https://t.me/welociti" target="_blank">
        <div class="li" style="background:rgba(41,182,246,.1);"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#29b6f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.198 2.433a2.242 2.242 0 0 0-1.022.215l-16.5 7.5a2.25 2.25 0 0 0 .126 4.073l3.9 1.205 2.306 7.051a.75.75 0 0 0 1.353.117l2.546-4.382 4.593 3.084a2.25 2.25 0 0 0 3.422-1.61l2.064-14.25a2.254 2.254 0 0 0-2.788-2.503z"/></svg></div>
        <div class="ln"><span class="lp">Telegram</span><span class="lh">@welociti</span></div><span class="larr">↗</span>
      </a>
      <a class="lc" id="lc2" href="https://instagram.com/welociti" target="_blank">
        <div class="li" style="background:rgba(225,48,108,.1);"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e1306c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg></div>
        <div class="ln"><span class="lp">Instagram</span><span class="lh">@welociti</span></div><span class="larr">↗</span>
      </a>
      <a class="lc" id="lc3" href="https://discord.com/users/welociti" target="_blank">
        <div class="li" style="background:rgba(88,101,242,.12);"><svg width="14" height="14" viewBox="0 0 24 24" fill="#5865f2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg></div>
        <div class="ln"><span class="lp">Discord</span><span class="lh">welociti</span></div><span class="larr">↗</span>
      </a>
      <a class="lc" id="lc4" href="https://rubika.ir/welociti" target="_blank">
        <div class="li" style="background:rgba(253,121,36,.1);"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fd7924" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg></div>
        <div class="ln"><span class="lp">Rubika</span><span class="lh">@welociti</span></div><span class="larr">↗</span>
      </a>
    </div>
    <div class="footer-txt">walter · welociti © 2025</div>
  </div>
</div>

<script>
// INTRO
const mc=document.getElementById('mc');
'Walter'.split('').forEach((ch,i)=>{
  const s=document.createElement('span');s.className='ic';s.textContent=ch;
  s.style.animationDelay=(0.55+i*0.07)+'s';
  document.getElementById('intro-name').appendChild(s);
});
setTimeout(()=>{
  const intro=document.getElementById('intro');
  intro.style.transition='opacity .8s ease,transform .8s ease';
  intro.style.opacity='0';intro.style.transform='scale(1.03)';
  setTimeout(()=>{
    intro.style.display='none';mc.classList.add('show');
    ['lc1','lc2','lc3','lc4'].forEach((id,i)=>{
      setTimeout(()=>{const e=document.getElementById(id);if(e){e.classList.add('visible');e.style.transition=`opacity .5s ease ${i*.09}s,transform .5s ease ${i*.09}s,background .22s,border-color .22s`;}},200+i*80);
    });
  },800);
},2600);

// BB QUOTES
const quotes=['"I am the one who knocks."','"Say my name."','"I am the danger."','"I did it for me."','"Stay out of my territory."'];
let qi=0;const bbQ=document.getElementById('bb-q');
setInterval(()=>{
  bbQ.style.opacity='0';bbQ.style.transform='translateY(5px)';
  setTimeout(()=>{qi=(qi+1)%quotes.length;bbQ.textContent=quotes[qi];bbQ.style.transition='opacity .5s,transform .5s';bbQ.style.opacity='1';bbQ.style.transform='translateY(0)';},350);
},3800);

// GAME SCENES
const gc=document.getElementById('game-canvas');
const gctx=gc.getContext('2d');
const gameScene=document.getElementById('game-scene');
const games=[
  {name:'Elden Ring',color:'#c8a96e',bg:'#120800'},
  {name:'Terraria',color:'#7ec850',bg:'#001208'},
  {name:'Call of Duty',color:'#e04040',bg:'#080000'},
  {name:'Blox Fruits',color:'#ff9020',bg:'#000810'},
  {name:'Dead by Daylight',color:'#a040ff',bg:'#080008'},
  {name:'Genshin Impact',color:'#40c0ff',bg:'#00080f'},
];
let gIdx=0;
function resizeGC(){gc.width=window.innerWidth;gc.height=window.innerHeight;}
resizeGC();window.addEventListener('resize',resizeGC);
function runGame(){
  const g=games[gIdx%games.length];gIdx++;
  let f=0,dur=200;
  function af(){
    f++;const w=gc.width,h=gc.height;
    gctx.clearRect(0,0,w,h);
    const bg=gctx.createRadialGradient(w/2,h/2,0,w/2,h/2,Math.max(w,h)*.7);
    bg.addColorStop(0,g.bg+'cc');bg.addColorStop(1,'#080808');
    gctx.fillStyle=bg;gctx.fillRect(0,0,w,h);
    gctx.strokeStyle=g.color+'10';gctx.lineWidth=1;
    for(let x=0;x<w;x+=80){gctx.beginPath();gctx.moveTo(x,0);gctx.lineTo(x,h);gctx.stroke();}
    for(let y=0;y<h;y+=80){gctx.beginPath();gctx.moveTo(0,y);gctx.lineTo(w,y);gctx.stroke();}
    gctx.save();gctx.globalAlpha=0.045;
    gctx.font=`bold ${Math.min(w*.2,180)}px 'Bebas Neue',sans-serif`;
    gctx.fillStyle=g.color;gctx.textAlign='center';gctx.textBaseline='middle';
    gctx.fillText(g.name,w/2,h/2);gctx.restore();
    const alpha=f<30?f/30:f>170?1-(f-170)/30:1;
    gameScene.style.opacity=(alpha*.25).toString();
    if(f<dur)requestAnimationFrame(af);
    else gameScene.style.opacity='0';
  }
  af();
}
setTimeout(()=>{runGame();setInterval(runGame,10000);},6000);

// BG CANVAS
const bgCanvas=document.getElementById('bg-canvas');
const ctx=bgCanvas.getContext('2d');
const page=document.getElementById('wp');
let mouse={x:-999,y:-999},hue=220,targetHue=220,time=0;
function resizeBG(){bgCanvas.width=page.offsetWidth;bgCanvas.height=page.offsetHeight;}
resizeBG();window.addEventListener('resize',resizeBG);
const blobs=[{x:.18,y:.28,r:260,sx:.0007,sy:.0005,ox:.16,oy:.13,ho:0},{x:.82,y:.68,r:290,sx:.0005,sy:.0007,ox:.19,oy:.11,ho:28},{x:.5,y:.12,r:210,sx:.0009,sy:.0006,ox:.11,oy:.17,ho:55},{x:.12,y:.82,r:230,sx:.0006,sy:.0008,ox:.21,oy:.1,ho:-22}];
const parts=Array.from({length:72},()=>({x:Math.random()*1400,y:Math.random()*900,r:Math.random()*1.6+.3,vx:(Math.random()-.5)*.28,vy:(Math.random()-.5)*.28,alpha:Math.random()*.38+.06,hOff:(Math.random()-.5)*42,pulse:Math.random()*Math.PI*2}));
page.addEventListener('mousemove',e=>{const r=page.getBoundingClientRect();mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top;targetHue=(mouse.x/bgCanvas.width)*360;});
page.addEventListener('mouseleave',()=>{mouse.x=-999;});
function lerp(a,b,t){return a+(b-a)*t;}
const letterEls=['l1','l2','l3','l4','l5','l6'].map(id=>document.getElementById(id));
const avatarEl=document.getElementById('avatar');
const avSvg=document.getElementById('av-svg');
const arcSpins=avSvg.querySelectorAll('.arc-spin');
const dotOs=avSvg.querySelectorAll('.dot-o,.dot-o2');
const avLetter=document.getElementById('av-letter');
function draw(){
  time+=.008;hue=lerp(hue,targetHue,.032);const h=hue;
  ctx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  ctx.fillStyle='#080808';ctx.fillRect(0,0,bgCanvas.width,bgCanvas.height);
  blobs.forEach((b,i)=>{
    const bx=(b.x+Math.sin(time*b.sx*1000+i)*b.ox)*bgCanvas.width;
    const by=(b.y+Math.cos(time*b.sy*1000+i*1.4)*b.oy)*bgCanvas.height;
    const g=ctx.createRadialGradient(bx,by,0,bx,by,b.r);
    g.addColorStop(0,`hsla(${h+b.ho},72%,38%,.11)`);g.addColorStop(.5,`hsla(${h+b.ho+15},65%,25%,.05)`);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,bgCanvas.width,bgCanvas.height);
  });
  if(mouse.x>0){
    const g=ctx.createRadialGradient(mouse.x,mouse.y,0,mouse.x,mouse.y,300);
    g.addColorStop(0,`hsla(${h},85%,55%,.18)`);g.addColorStop(.4,`hsla(${h},75%,40%,.07)`);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,bgCanvas.width,bgCanvas.height);
  }
  parts.forEach(p=>{
    p.pulse+=.018;
    const dx=mouse.x>0?mouse.x-p.x:0,dy=mouse.x>0?mouse.y-p.y:0;
    const dist=Math.sqrt(dx*dx+dy*dy);const inf=mouse.x>0?Math.max(0,1-dist/190):0;
    p.x+=p.vx+dx*inf*.005;p.y+=p.vy+dy*inf*.005;
    if(p.x<0)p.x=bgCanvas.width;if(p.x>bgCanvas.width)p.x=0;
    if(p.y<0)p.y=bgCanvas.height;if(p.y>bgCanvas.height)p.y=0;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r+inf*2+Math.sin(p.pulse)*.3,0,Math.PI*2);
    ctx.fillStyle=`hsla(${h+p.hOff},72%,72%,${Math.min(p.alpha+inf*.5,.86)})`;ctx.fill();
  });
  letterEls.forEach(el=>{
    if(!el)return;
    const rect=el.getBoundingClientRect(),pr=page.getBoundingClientRect();
    const lx=rect.left-pr.left+rect.width/2,ly=rect.top-pr.top+rect.height/2;
    const dist=Math.sqrt((mouse.x-lx)**2+(mouse.y-ly)**2);
    const inf=mouse.x>0?Math.max(0,1-dist/130):0;
    el.style.color=inf>.06?`hsl(${h},82%,${65+inf*20}%)`:'#fff';
  });
  if(mouse.x>0){
    avatarEl.style.borderColor=`hsla(${h},72%,62%,.5)`;avatarEl.style.boxShadow=`0 0 24px hsla(${h},80%,55%,.16)`;
    avLetter.style.color=`hsl(${h},75%,78%)`;
    arcSpins[0].style.stroke=`hsla(${h},82%,68%,.8)`;arcSpins[1].style.stroke=`hsla(${h},82%,68%,.32)`;arcSpins[2].style.stroke=`hsla(${h},82%,68%,.13)`;
    dotOs[0].style.fill=`hsl(${h},82%,72%)`;dotOs[1].style.fill=`hsla(${h},82%,72%,.4)`;
  } else {
    avatarEl.style.borderColor='rgba(255,255,255,.15)';avatarEl.style.boxShadow='none';avLetter.style.color='#fff';
    arcSpins[0].style.stroke='rgba(255,255,255,.45)';arcSpins[1].style.stroke='rgba(255,255,255,.18)';arcSpins[2].style.stroke='rgba(255,255,255,.08)';
    dotOs[0].style.fill='#fff';dotOs[1].style.fill='rgba(255,255,255,.35)';
  }
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
